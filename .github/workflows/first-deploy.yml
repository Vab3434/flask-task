name: Deploy Flask App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Deploy to AWS EC2
      run: |
        ssh user@your-ec2-ip "
        cd project &&
        git pull &&
        systemctl restart app
        "
